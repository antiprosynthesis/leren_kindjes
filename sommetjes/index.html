<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sommetjes</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #dcdcdc;
            --cursor-color: #ffffff;
        }

        body {
            font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Mono", "Droid Sans Mono", "Source Code Pro", monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 0 1rem;
        }

        /* ALGEMENE STIJLEN */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        .sum-line {
            display: flex;
            align-items: baseline;
            /* Gebruik gap voor exact dezelfde ruimte tussen de elementen */
            gap: 1ch; 
            font-size: clamp(2rem, 12vw, 5rem);
            justify-content: center;
            width: 100%;
        }

        #sum-display {
            white-space: pre;
            text-align: right;
            /* Zorg dat de som altijd op dezelfde plek eindigt */
            min-width: 10ch; 
        }

        .input-wrapper {
            display: inline-flex;
            align-items: baseline;
            position: relative;
            min-width: 3ch;
        }

        #display-text {
            white-space: pre;
        }

        input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.8em;
            background-color: var(--cursor-color);
            animation: blink 1.2s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        /* Verberg cursor als de input geblokkeerd is */
        .locked .cursor {
            display: none;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .feedback {
            font-size: clamp(1.2rem, 6vw, 3rem);
            min-height: 4rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* MEDIA QUERIES */
        @media (max-width: 600px) {
            body {
                align-items: flex-start;
                padding-top: 15vh;
            }
            .container {
                gap: 4rem;
            }
        }

        @media (min-width: 601px) {
            body {
                align-items: center;
            }
            .container {
                position: relative;
                transform: translateY(-5vh);
                gap: 8rem;
            }
            .sum-line {
                font-size: 10rem;
                /* Grotere gap op desktop voor de grote letters */
                gap: 1ch; 
                /* Subtiele verschuiving naar links voor balans met het antwoord */
                transform: translateX(-0.5ch);
            }
            .feedback {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                margin-top: 5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sum-line">
            <span id="sum-display">? + ? =</span>
            <div class="input-wrapper">
                <span id="display-text"></span><span class="cursor"></span>
                <input type="number" id="answer" autofocus autocomplete="off">
            </div>
        </div>
        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        const sumDisplay = document.getElementById('sum-display');
        const answerInput = document.getElementById('answer');
        const displayText = document.getElementById('display-text');
        const feedbackElement = document.getElementById('feedback');

        const correctMessages = [
            "Keigoed!", "Zot gedaan!", "Gij zijt een krak!", "Amai, gij kunt dat goed!",
            "Ferm gewerkt!", "Schitterend!", "Hoera! Gij zijt de beste.", "Wauw, echt knap!",
            "Klasse!", "Heel goed!", "Zalig!", "Top gedaan!", "Super!", "Goe bezig!",
            "Ongelooflijk!", "Fantastisch!", "Jij bent een ster!", "Prachtig!", "Wijs!", "Echt chapeau!"
        ];

        const incorrectMessages = [
            "Oepsie, probeer nog eens!", "Lap, dat was 'm niet!", "Niet opgeven!",
            "Nog een keertje proberen?", "Kieken! Dat is niet juist.", "Bijna!",
            "Amai, dat was een moeilijke!", "Jammer, nog ne keer!", "Oei oei oei!",
            "Nog ne keer!", "Mis poes!", "Niet juist, snotneusje!", "Helaas!",
            "Probeer het nog een keer.", "Blijven oefenen!", "Ge kunt het wel!",
            "Euh... nee.", "Zit ge te dromen?", "Oeps, foutje!", "Nog een poging!"
        ];

        let currentResult = 0;

        function generateSum() {
            const isPlus = Math.random() > 0.5;
            let a, b, op;

            if (isPlus) {
                const result = Math.floor(Math.random() * 21);
                a = Math.floor(Math.random() * (result + 1));
                b = result - a;
                op = '+';
                currentResult = result;
            } else {
                a = Math.floor(Math.random() * 21);
                b = Math.floor(Math.random() * (a + 1));
                op = '-';
                currentResult = a - b;
            }

            // Ontgrendel input
            document.querySelector('.input-wrapper').classList.remove('locked');
            answerInput.disabled = false;

            // De som eindigt op een =, de gap van 1ch in de CSS zorgt voor de ruimte daarna
            sumDisplay.textContent = `${a} ${op} ${b} =`;
            answerInput.value = '';
            displayText.textContent = '';
            feedbackElement.textContent = '';
            answerInput.focus();
        }

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !answerInput.disabled) checkAnswer();
        });

        answerInput.addEventListener('input', () => {
            displayText.textContent = answerInput.value;
        });

        document.addEventListener('click', () => {
            if (!answerInput.disabled) answerInput.focus();
        });
        document.addEventListener('keydown', () => {
            if (!answerInput.disabled) answerInput.focus();
        });

        function checkAnswer() {
            if (answerInput.value === '') return;
            const val = parseInt(answerInput.value);

            if (val === currentResult) {
                const msg = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                feedbackElement.textContent = msg;

                // Vergrendel input tijdens pauze
                document.querySelector('.input-wrapper').classList.add('locked');
                answerInput.disabled = true;

                setTimeout(generateSum, 3000);
            } else {
                const msg = incorrectMessages[Math.floor(Math.random() * incorrectMessages.length)];
                feedbackElement.textContent = msg;
                answerInput.value = '';
                displayText.textContent = '';
                answerInput.focus();
            }
        }

        generateSum();
    </script>
</body>
</html>
